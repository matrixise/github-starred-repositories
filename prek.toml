[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.11.4"
hooks = [
  { id = "ruff", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "ty", name = "ty type check", language = "system", entry = "uv run ty check", pass_filenames = false },
  { id = "gitleaks", name = "gitleaks secret scan", language = "system", entry = "gitleaks git --verbose", pass_filenames = false, stages = ["pre-push"] },
]
